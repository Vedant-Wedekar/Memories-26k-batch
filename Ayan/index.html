<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#faf6ef" />
  <title>BCA 2023-2026 Batch❤️</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Noise texture layer -->
  <div class="noise"></div>

  <!-- Ambient light orbs -->


  <!-- Floating particles canvas -->
  

  <main class="container" id="top">

    <!-- ── HEADER ── -->
<header class="header">
      <div class="stamp">
        <span class="stamp-text">a little surprise</span>
      </div>
      <h1 class="title">
        For the memories<br/>
        <em>that matter most</em>
      </h1>
  
      <div class="header-rule">
        <span class="rule-line"></span>
        <span class="rule-diamond">◆</span>
        <span class="rule-line"></span>
      </div>
    </header>


    <!-- ── MAIN PLAYER ── -->
    <section class="player-section">

      <!-- Film-strip perforations -->
      <div class="film-strip left" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="film-strip right" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>

      <div class="player-frame">

        <!-- Glare effect -->
        <div class="player-glare"></div>

        <video
          id="mainVideo"
          class="main-video"
          autoplay
          
          playsinline
          controls
          preload="none"
        >
          <source src="https://res.cloudinary.com/dduri4zfq/video/upload/v1777303847/Snapchat-2142001980_compressed_yemcpz.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>

      

      </div><!-- /.player-frame -->
    </section>

    <!-- ── NOW PLAYING ── -->
    <div class="now-playing" id="nowPlaying">
      <span class="np-label">now playing</span>
      <span class="np-sep">·</span>
      <span class="np-title" id="nowPlayingLabel">Memory 1</span>
    </div>

    <!-- ── THUMBNAIL STRIP ── -->
    <section class="thumb-section">
      <p class="section-label">— select a memory —</p>

      <div class="thumb-row">

        <button class="thumb active"
          data-video="https://res.cloudinary.com/dduri4zfq/video/upload/v1777303847/Snapchat-2142001980_compressed_yemcpz.mp4"
          data-label="Memory 1"
          data-num="01"
          aria-label="Play Memory 1">
          <div class="thumb-frame">
            <img src="https://res.cloudinary.com/dduri4zfq/image/upload/v1777338733/Screenshot_2026-04-28_063759_jnudez.png" alt="Memory 1" loading="lazy" />
            <div class="thumb-play">
              <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M8 5.14v14l11-7-11-7z"/></svg>
            </div>
          </div>
          <span class="thumb-num">01</span>
          <span class="thumb-name">Memory 1</span>
        </button>

        <button class="thumb"
          data-video="https://res.cloudinary.com/dduri4zfq/video/upload/v1777303845/Snapchat-455403609_compressed_oqnnw8.mp4"
          data-label="Memory 2"
          data-num="02"
          aria-label="Play Memory 2">
          <div class="thumb-frame">
            <img src="https://res.cloudinary.com/dduri4zfq/image/upload/v1777338734/Screenshot_2026-04-28_063827_hovfqr.png" alt="Memory 2" loading="lazy" />
            <div class="thumb-play">
              <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M8 5.14v14l11-7-11-7z"/></svg>
            </div>
          </div>
          <span class="thumb-num">02</span>
          <span class="thumb-name">Memory 2</span>
        </button>

           <button class="thumb"
          data-video="https://res.cloudinary.com/dduri4zfq/video/upload/v1777303842/Snapchat-499254868_compressed_hl9gct.mp4"
          data-label="Memory 3"
          data-num="02"
          aria-label="Play Memory 2">
          <div class="thumb-frame">
            <img src="https://res.cloudinary.com/dduri4zfq/image/upload/v1777338734/Screenshot_2026-04-28_063901_qh5syj.png" alt="Memory 2" loading="lazy" />
            <div class="thumb-play">
              <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M8 5.14v14l11-7-11-7z"/></svg>
            </div>
          </div>
          <span class="thumb-num">03</span>
          <span class="thumb-name">Memory 3</span>
        </button>   
        
        <button class="thumb"
          data-video="https://res.cloudinary.com/dduri4zfq/video/upload/v1777303874/VID_20260210_185718670_compressed_lf65ne.mp4"
          data-label="Memory 4"
          data-num="02"
          aria-label="Play Memory 2">
          <div class="thumb-frame">
            <img src="https://res.cloudinary.com/dduri4zfq/image/upload/v1777338740/Screenshot_2026-04-28_063918_pqirlb.png" alt="Memory 2" loading="lazy" />
            <div class="thumb-play">
              <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M8 5.14v14l11-7-11-7z"/></svg>
            </div>
          </div>
          <span class="thumb-num">04</span>
          <span class="thumb-name">Memory 4</span>
        </button>  
        
        <button class="thumb"
          data-video="https://res.cloudinary.com/dduri4zfq/video/upload/v1777303850/Snapchat-741589413_compressed_r5fgm4.mp4"
          data-label="Memory 5"
          data-num="02"
          aria-label="Play Memory 2">
          <div class="thumb-frame">
            <img src="https://res.cloudinary.com/dduri4zfq/image/upload/v1777338733/Screenshot_2026-04-28_063935_da2qh7.png" alt="Memory 2" loading="lazy" />
            <div class="thumb-play">
              <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M8 5.14v14l11-7-11-7z"/></svg>
            </div>
          </div>
          <span class="thumb-num">05</span>
          <span class="thumb-name">Memory 5</span>
        </button>  
        
        <button class="thumb"
          data-video="https://res.cloudinary.com/dduri4zfq/video/upload/v1777310301/Snapchat-606224929_umnfii.mp4"
          data-label="Memory 6"
          data-num="02"
          aria-label="Play Memory 2">
          <div class="thumb-frame">
            <img src="https://res.cloudinary.com/dduri4zfq/image/upload/v1777338734/Screenshot_2026-04-28_064027_mcc8g5.png" alt="Memory 2" loading="lazy" />
            <div class="thumb-play">
              <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M8 5.14v14l11-7-11-7z"/></svg>
            </div>
          </div>
          <span class="thumb-num">06</span>
          <span class="thumb-name">Memory 6</span>
        </button>   
        
       
      </div>
    </section>

    <!-- ── QUOTE CARD ── -->
<section class="quote-section">
  <div class="quote-card">
    <span class="quote-mark open">"</span>
    <p class="quote-text">
      Just a collection of memories<br/>
      you might miss someday…<br/>
      <em>Kaisa Lga?</em>
    </p>
    <span class="quote-mark close">"</span>
  </div>
</section>

</main>

<!-- ── FOOTER ── -->
<footer class="footer">
  <div class="footer-rule">
    <span class="rule-line"></span>
    <span class="rule-diamond">◆</span>
    <span class="rule-line"></span>
  </div>
  <p class="footer-text">Made By VED</p>
</footer>

  <script src="script.js"></script>
</body>
</html>
